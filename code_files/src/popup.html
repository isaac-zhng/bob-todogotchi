<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>IBM Bob</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    /* ── Carbon tokens ── */
    :root {
      --cds-background:       #f4f4f4;
      --cds-layer-01:         #ffffff;
      --cds-border-subtle-01: #e0e0e0;
      --cds-border-strong-01: #8d8d8d;
      --cds-text-primary:     #161616;
      --cds-text-secondary:   #525252;
      --cds-text-on-color:    #ffffff;
      --cds-interactive:      #0f62fe;
      --cds-support-success:  #24a148;
      --cds-support-warning:  #f1c21b;
      --cds-support-error:    #da1e28;
      --cds-spacing-01: 2px;
      --cds-spacing-02: 4px;
      --cds-spacing-03: 8px;
      --cds-spacing-04: 12px;
      --cds-spacing-05: 16px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 220px;
      height: 340px;
      overflow: hidden;
      background: transparent;
      font-family: 'IBM Plex Sans', 'Helvetica Neue', Arial, sans-serif;
      font-size: 12px;
      -webkit-font-smoothing: antialiased;
      -webkit-app-region: drag;
      user-select: none;
    }

    /* ── Card (Carbon Tile) ── */
    #card {
      width: 204px;
      margin: 8px auto 0;
      background: var(--cds-layer-01);
      border: 1px solid var(--cds-border-subtle-01);
      /* Carbon uses no border-radius on tiles — sharp corners */
      display: flex;
      flex-direction: column;
      align-items: stretch;
    }

    /* ── Card header bar (Carbon UI Shell mini) ── */
    #card-header {
      background: #161616;
      padding: var(--cds-spacing-03) var(--cds-spacing-04);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    #name-tag {
      font-size: 11px;
      font-weight: 600;
      color: #f4f4f4;
      letter-spacing: .32px;
      text-transform: uppercase;
    }

    /* Close — not draggable */
    #close-btn {
      -webkit-app-region: no-drag;
      background: none;
      border: none;
      color: #8d8d8d;
      cursor: pointer;
      font-size: 14px;
      line-height: 1;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 20px;
      height: 20px;
    }
    #close-btn:hover { color: var(--cds-support-error); }

    /* ── Avatar area ── */
    #avatar-area {
      padding: var(--cds-spacing-04) var(--cds-spacing-04) var(--cds-spacing-02);
      display: flex;
      justify-content: center;
    }
    #avatar { display: block; }

    /* ── Speech bubble (Carbon inline notification) ── */
    #bubble {
      margin: 0 var(--cds-spacing-04);
      padding: var(--cds-spacing-02) var(--cds-spacing-03);
      background: var(--cds-background);
      border-left: 3px solid var(--cds-interactive);
      font-size: 11px;
      color: var(--cds-text-primary);
      line-height: 1.4;
      letter-spacing: .16px;
      min-height: 28px;
      display: flex;
      align-items: center;
    }

    /* ── Happiness section ── */
    #happiness-section {
      padding: var(--cds-spacing-03) var(--cds-spacing-04) var(--cds-spacing-02);
      display: flex;
      flex-direction: column;
      gap: var(--cds-spacing-01);
    }
    #happiness-label-row {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      color: var(--cds-text-secondary);
      letter-spacing: .32px;
    }
    /* Carbon Progress Bar */
    #hp-track {
      width: 100%;
      height: 4px;
      background: var(--cds-border-subtle-01);
      overflow: hidden;
    }
    #hp-fill {
      height: 100%;
      background: var(--cds-support-success);
      transition: width .6s ease, background .6s ease;
    }

    /* ── Task summary (Carbon helper text) ── */
    #task-summary {
      padding: var(--cds-spacing-02) var(--cds-spacing-04) var(--cds-spacing-04);
      font-size: 11px;
      color: var(--cds-text-secondary);
      letter-spacing: .32px;
      border-top: 1px solid var(--cds-border-subtle-01);
      margin-top: var(--cds-spacing-02);
    }
  </style>
</head>
<body>

  <div id="card" role="region" aria-label="IBM Bob status">

    <div id="card-header">
      <span id="name-tag">IBM Bob</span>
      <button id="close-btn" title="Dismiss Bob" aria-label="Dismiss Bob">&#x2715;</button>
    </div>

    <div id="avatar-area">
      <object id="avatar" data="assets/bob.svg" type="image/svg+xml" width="88" height="88" aria-hidden="true"
        style="display:block;pointer-events:none;"></object>
    </div>

    <div id="bubble" role="status" aria-live="polite">Hello! Add some tasks!</div>

    <div id="happiness-section">
      <div id="happiness-label-row">
        <span>Happiness</span>
        <span id="hp-pct">100%</span>
      </div>
      <div id="hp-track" role="progressbar" aria-valuenow="100" aria-valuemin="0" aria-valuemax="100" aria-label="Bob's happiness">
        <div id="hp-fill" style="width:100%"></div>
      </div>
    </div>

    <div id="task-summary" aria-live="polite">No tasks yet</div>

  </div>

  <script>
    /* ── Mouth paths per mood ── */
    const MOUTHS = {
      happy:   'M144.5,174.4c12,5,18,5.5,30,0',
      neutral: 'M144.5,174.4h30',
      sad:     'M144.5,179.4c12,-5,18,-5.5,30,0',
    };

    function updateMouth(happiness) {
      const mood = happiness > 60 ? 'happy' : happiness > 30 ? 'neutral' : 'sad';
      const svgDoc = document.getElementById('avatar').contentDocument;
      if (!svgDoc) return;
      const mouth = svgDoc.getElementById('bob-mouth');
      if (mouth) mouth.setAttribute('d', MOUTHS[mood]);
    }

    /* ── Quips ── */
    const QUIPS = {
      happy:   ["You're crushing it!", "Tasks done = Bob happy!", "Productivity level: max!", "Keep it up!", "Look at you go!"],
      neutral: ["Almost there!", "A few more tasks to go.", "You've got this.", "Steady progress.", "Half way there!"],
      sad:     ["I believe in you…", "Please complete some tasks!", "I need those checkmarks…", "Don't give up on me!", "Tasks = my life force."],
    };

    function getQuip(happiness) {
      const mood = happiness > 60 ? 'happy' : happiness > 30 ? 'neutral' : 'sad';
      const arr  = QUIPS[mood];
      return arr[Math.floor(Math.random() * arr.length)];
    }

    /* ── State ── */
    let state = { tasks: [], happiness: 100 };

    function updateUI() {
      const pct = state.happiness;

      // Progress bar
      const fill = document.getElementById('hp-fill');
      fill.style.width      = pct + '%';
      fill.style.background = pct > 60 ? '#24a148' : pct > 30 ? '#f1c21b' : '#da1e28';
      document.getElementById('hp-pct').textContent = pct + '%';
      document.getElementById('hp-track').setAttribute('aria-valuenow', pct);

      // Task summary — state uses daily/weekly/monthly arrays
      const allTasks = [...(state.daily || []), ...(state.weekly || []), ...(state.monthly || [])];
      const done     = allTasks.filter(t => t.done).length;
      document.getElementById('task-summary').textContent =
        allTasks.length === 0 ? 'No tasks yet' : done + '\u202f/\u202f' + allTasks.length + ' tasks complete';

      // Speech bubble
      document.getElementById('bubble').textContent = getQuip(pct);

      // Mouth expression
      updateMouth(pct);
    }

    /* ── IPC sync ── */
    if (window.electronAPI) {
      window.electronAPI.onStateSync(json => {
        try { state = JSON.parse(json); } catch (_) {}
        updateUI();
      });
      // Request current state from main window on load
      window.electronAPI.requestState();
    }

    document.getElementById('close-btn').addEventListener('click', () => {
      if (window.electronAPI) window.electronAPI.closeBobPopup();
    });

    /* Rotate quip every 8 s */
    setInterval(updateUI, 8000);

    /* Wait for the SVG to load before first render so mouth swap works */
    document.getElementById('avatar').addEventListener('load', updateUI);
    updateUI();
  </script>
</body>
</html>
