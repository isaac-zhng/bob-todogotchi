<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IBM Bob Notepad</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, "Segoe UI", system-ui, sans-serif;
      background: #f4f4f4;
      color: #161616;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    header {
      background: #0f62fe;
      color: #fff;
      padding: 14px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    header h1 { font-size: 18px; font-weight: 600; letter-spacing: .3px; }
    #bob-health-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 13px;
    }
    #bob-health-bar span { white-space: nowrap; }
    #health-track {
      width: 160px;
      height: 12px;
      background: rgba(255,255,255,0.3);
      border-radius: 6px;
      overflow: hidden;
    }
    #health-fill {
      height: 100%;
      background: #42be65;
      border-radius: 6px;
      transition: width .5s ease, background .5s ease;
    }
    #bob-toggle-btn {
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.4);
      color: #fff;
      padding: 5px 12px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
    }
    #bob-toggle-btn:hover { background: rgba(255,255,255,0.25); }

    /* ── Add task row ── */
    #add-row {
      display: flex;
      gap: 8px;
      padding: 16px 20px 8px;
      flex-shrink: 0;
    }
    #new-task-input {
      flex: 1;
      padding: 9px 12px;
      border: 1px solid #c6c6c6;
      border-radius: 4px;
      font-size: 14px;
      outline: none;
    }
    #new-task-input:focus { border-color: #0f62fe; box-shadow: 0 0 0 2px rgba(15,98,254,0.2); }
    #add-btn {
      padding: 9px 18px;
      background: #0f62fe;
      color: #fff;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
    }
    #add-btn:hover { background: #0353e9; }

    /* ── Task list ── */
    #task-list-wrapper {
      flex: 1;
      overflow-y: auto;
      padding: 8px 20px 20px;
    }
    #task-list { list-style: none; }
    .task-item {
      display: flex;
      align-items: center;
      gap: 12px;
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 6px;
      padding: 10px 14px;
      margin-bottom: 8px;
      transition: opacity .3s;
    }
    .task-item.done { opacity: 0.5; }
    .task-item input[type="checkbox"] {
      width: 18px; height: 18px;
      accent-color: #0f62fe;
      cursor: pointer;
      flex-shrink: 0;
    }
    .task-label {
      flex: 1;
      font-size: 14px;
      line-height: 1.4;
      cursor: pointer;
    }
    .task-item.done .task-label { text-decoration: line-through; color: #6f6f6f; }
    .delete-btn {
      background: none;
      border: none;
      color: #6f6f6f;
      cursor: pointer;
      font-size: 18px;
      line-height: 1;
      padding: 0 4px;
      border-radius: 3px;
    }
    .delete-btn:hover { color: #da1e28; background: #fff1f1; }

    /* ── Empty state ── */
    #empty-msg {
      text-align: center;
      color: #a8a8a8;
      padding: 60px 20px;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <header>
    <h1>IBM Bob Notepad</h1>
    <div id="bob-health-bar">
      <span id="health-label">Bob: 100%</span>
      <div id="health-track"><div id="health-fill" style="width:100%"></div></div>
    </div>
    <button id="bob-toggle-btn">Show Bob</button>
  </header>

  <div id="add-row">
    <input id="new-task-input" type="text" placeholder="Add a new task…" autocomplete="off" />
    <button id="add-btn">Add</button>
  </div>

  <div id="task-list-wrapper">
    <ul id="task-list"></ul>
    <p id="empty-msg">No tasks yet. Add one above!</p>
  </div>

  <script>
    /* ── State ── */
    let state = { tasks: [], health: 100, bobVisible: false };

    function loadState() {
      try {
        const saved = localStorage.getItem('bob-state');
        if (saved) state = JSON.parse(saved);
      } catch (_) {}
    }

    function saveAndBroadcast() {
      localStorage.setItem('bob-state', JSON.stringify(state));
      if (window.electronAPI) window.electronAPI.broadcastState(JSON.stringify(state));
    }

    /* ── Health calculation ── */
    function recalcHealth() {
      const tasks = state.tasks;
      if (tasks.length === 0) { state.health = 100; return; }
      const done = tasks.filter(t => t.done).length;
      state.health = Math.round((done / tasks.length) * 100);
    }

    /* ── Render ── */
    function render() {
      const list = document.getElementById('task-list');
      const empty = document.getElementById('empty-msg');
      list.innerHTML = '';

      if (state.tasks.length === 0) {
        empty.style.display = 'block';
      } else {
        empty.style.display = 'none';
        state.tasks.forEach((task, idx) => {
          const li = document.createElement('li');
          li.className = 'task-item' + (task.done ? ' done' : '');

          const cb = document.createElement('input');
          cb.type = 'checkbox';
          cb.checked = task.done;
          cb.addEventListener('change', () => { toggleTask(idx); });

          const label = document.createElement('span');
          label.className = 'task-label';
          label.textContent = task.text;
          label.addEventListener('click', () => { toggleTask(idx); });

          const del = document.createElement('button');
          del.className = 'delete-btn';
          del.textContent = '×';
          del.title = 'Delete task';
          del.addEventListener('click', () => { deleteTask(idx); });

          li.appendChild(cb);
          li.appendChild(label);
          li.appendChild(del);
          list.appendChild(li);
        });
      }

      // Update health bar
      const pct = state.health;
      const fill = document.getElementById('health-fill');
      fill.style.width = pct + '%';
      fill.style.background = pct > 60 ? '#42be65' : pct > 30 ? '#f1c21b' : '#da1e28';
      document.getElementById('health-label').textContent = 'Bob: ' + pct + '%';

      // Bob toggle button label
      document.getElementById('bob-toggle-btn').textContent =
        state.bobVisible ? 'Hide Bob' : 'Show Bob';
    }

    /* ── Actions ── */
    function addTask(text) {
      text = text.trim();
      if (!text) return;
      state.tasks.push({ id: Date.now(), text, done: false });
      recalcHealth();
      saveAndBroadcast();
      render();
    }

    function toggleTask(idx) {
      state.tasks[idx].done = !state.tasks[idx].done;
      recalcHealth();
      saveAndBroadcast();
      render();
    }

    function deleteTask(idx) {
      state.tasks.splice(idx, 1);
      recalcHealth();
      saveAndBroadcast();
      render();
    }

    /* ── UI events ── */
    document.getElementById('add-btn').addEventListener('click', () => {
      const input = document.getElementById('new-task-input');
      addTask(input.value);
      input.value = '';
    });

    document.getElementById('new-task-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') {
        const input = e.target;
        addTask(input.value);
        input.value = '';
      }
    });

    document.getElementById('bob-toggle-btn').addEventListener('click', () => {
      state.bobVisible = !state.bobVisible;
      if (window.electronAPI) {
        if (state.bobVisible) window.electronAPI.openBobPopup();
        else window.electronAPI.closeBobPopup();
      }
      saveAndBroadcast();
      render();
    });

    /* ── IPC sync from Bob popup ── */
    if (window.electronAPI) {
      window.electronAPI.onStateSync(json => {
        try { state = JSON.parse(json); } catch (_) {}
        render();
      });
    }

    /* ── Boot ── */
    loadState();
    render();
  </script>
</body>
</html>
